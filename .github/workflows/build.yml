name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install NDK 22.0.7026061
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;22.0.7026061"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/22.0.7026061" >> $GITHUB_ENV

      - name: Download Gradle 7.3.3
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.3.3-bin.zip
          unzip -q gradle-7.3.3-bin.zip
          echo "$PWD/gradle-7.3.3/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ML-ESP-APK
          path: app/build/outputs/apk/debug/app-debug.apk
